<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="클래스노트 — 선생님이 만든 수업자료를 확인하세요.">
    <meta property="og:title" content="클래스노트 수업자료">
    <meta property="og:description" content="선생님이 공유한 수업자료입니다. 클릭해서 확인하세요.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#f7f7f7">
    <title>클래스노트</title>
    <link rel="icon" href="https://fav.farm/📑">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="template-styles.css">
    <link rel="stylesheet" href="view.css">
</head>
<body>
    <!-- Header -->
    <header class="view-header" id="viewHeader">
        <div class="view-header__inner">
            <div class="view-header__brand">
                <span class="view-header__icon">📑</span>
                <span class="view-header__name">클래스노트</span>
            </div>
            <div class="view-header__meta" id="viewMeta"></div>
            <div class="view-header__tools">
                <button class="view-header__tool" id="viewShare" aria-label="공유" title="링크 공유">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                </button>
                <button class="view-header__tool" id="viewFullscreen" aria-label="전체화면" title="전체화면">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                </button>
                <button class="view-header__tool" id="viewPdf" aria-label="PDF 저장" title="PDF 저장">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
                <button class="view-header__tool view-header__tool--soon" id="viewTts" aria-label="읽어주기" title="읽어주기 (준비중)" disabled>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>
                </button>
                <button class="view-header__tool" id="viewDark" aria-label="다크모드 전환" title="다크모드">🌙</button>
                <button class="view-header__tool" id="viewPrint" aria-label="인쇄" title="인쇄">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Session Stepper -->
    <div class="view-sessions" id="viewSessions" style="display:none">
        <div class="view-sessions__stepper">
            <button class="view-sessions__arrow" id="sessionPrev" aria-label="이전 세션">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button class="view-sessions__selector" id="sessionSelector">
                <span class="view-sessions__title" id="sessionTitle">Session 1</span>
                <svg class="view-sessions__chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <button class="view-sessions__arrow" id="sessionNext" aria-label="다음 세션">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
        </div>
        <!-- Dropdown list -->
        <div class="view-sessions__dropdown" id="sessionDropdown" style="display:none">
            <div class="view-sessions__dropdown-list" id="sessionDropdownList"></div>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="view-toast" id="viewToast" style="display:none"></div>

    <!-- Note Container -->
    <main class="view-body" id="viewBody">
        <!-- Loading state -->
        <div class="view-loading" id="viewLoading" style="display:none">
            <div class="view-loading__spinner"></div>
            <p class="view-loading__text">수업자료를 불러오는 중...</p>
        </div>

        <div class="view-pages" id="noteContainer">
            <!-- Pages injected here by view.js -->
        </div>

        <!-- Page Navigator (floating bottom) -->
        <div class="view-pager" id="viewPager" style="display:none">
            <button class="view-pager__btn" id="viewPrev" aria-label="이전 페이지">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="view-pager__dots" id="viewDots"></div>
            <span class="view-pager__label" id="viewBadge"></span>
            <button class="view-pager__btn" id="viewNext" aria-label="다음 페이지">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
        </div>

        <!-- Empty state -->
        <div class="view-empty" id="viewEmpty" style="display:none">
            <div class="view-empty__icon">📄</div>
            <div class="view-empty__title">노트를 찾을 수 없습니다</div>
            <div class="view-empty__desc">링크가 올바른지 확인해주세요.</div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="view-footer">
        <span>Made with <a href="index.html" target="_blank">클래스노트</a></span>
    </footer>

    <script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script defer src="firebase-config.js"></script>
    <script defer src="view.js"></script>
</body>
</html>
